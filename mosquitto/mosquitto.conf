persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

listener 1883 0.0.0.0
protocol mqtt

# Bootstrap mode: keep the broker usable before credentials are in place.
# Harden later by setting allow_anonymous false and adding a password_file.
allow_anonymous true
