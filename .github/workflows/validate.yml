name: Validate repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime env
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Validate shell scripts
        run: bash -n scripts/deploy-to-nuc.sh

      - name: Check required files
        run: |
          test -f docker-compose.yml
          test -f .env.example
          test -f mosquitto/mosquitto.conf
          test -f docs/operations.md
          test -f scripts/deploy-to-nuc.sh

      - name: Check required directories
        run: |
          test -d homeassistant
          test -d plex
          test -d mosquitto/data
          test -d mosquitto/log
          test -d esphome
          test -d portainer
          test -d tailscale
          test -d srv/media
          test -d srv/downloads
